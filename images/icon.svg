<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="100" height="100" rx="22" fill="url(#grad)" />
  <!-- Film frame corners -->
  <rect x="10" y="10" width="10" height="10" rx="2" fill="rgba(255,255,255,0.25)" />
  <rect x="80" y="10" width="10" height="10" rx="2" fill="rgba(255,255,255,0.25)" />
  <rect x="10" y="80" width="10" height="10" rx="2" fill="rgba(255,255,255,0.25)" />
  <rect x="80" y="80" width="10" height="10" rx="2" fill="rgba(255,255,255,0.25)" />
  <!-- Caption lines (subtitle bars) -->
  <rect x="18" y="55" width="64" height="8" rx="4" fill="rgba(255,255,255,0.9)" />
  <rect x="26" y="69" width="48" height="8" rx="4" fill="rgba(255,255,255,0.55)" />
  <!-- Play/camera icon -->
  <circle cx="50" cy="36" r="14" fill="rgba(255,255,255,0.15)" />
  <polygon points="45,30 45,42 60,36" fill="white" />
</svg>
